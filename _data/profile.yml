short_bio: >-
  <p>
    I am Qingyuan Liu (刘庆远), an incoming Ph.D. student at the <a href="https://www.ntu.edu.sg/computing" target="_blank">College of Computing and Data Science</a>, <a href="https://www.ntu.edu.sg/" target="_blank">Nanyang Technological University</a>, advised by <a href="https://personal.ntu.edu.sg/wangwy/" target="_blank">Prof. Wenya Wang</a>.
    Previously, I was a research assistant at the <a href="https://nlp.ucla.edu/" target="_blank">UCLA NLP Lab</a>, advised by <a href="https://violetpeng.github.io/" target="_blank">Prof. Violet Peng</a>. 
    I received my M.S. in Computer Engineering at <a href="https://www.columbia.edu/" target="_blank">Columbia University in the City of New York</a> in May 2025 and B.E. in Computer Science and Technology from <a href="https://www.hust.edu.cn/" target="_blank">Huazhong University of Science and Technology</a> in 2023.
    I am working closely with <a href="https://jasonforjoy.github.io/" target="_blank">Jiachen Gu</a> and <a href="https://yyzcowtodd.cn/" target="_blank">Yunzhi Yao</a>.
  </p>
  <p>
    I study knowledge mechanisms and editing for agentic systems, with a focus on how knowledge evolves and interacts for LLMs, and how to design effective methods for memory/reasoning manipulation.
    Learn more about my research <a href="https://tianzhaohaha.github.io/research">here</a>.
  </p>
  <p>
    Research keywords include: <span class="text-hl">lifelong learning</span>, <span class="text-hl">model editing</span>, <span class="text-hl">agentic systems</span>.
  </p>
